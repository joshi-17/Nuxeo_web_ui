<!--
`fid-analytical-dashboard`
@group Nuxeo UI
@element fid-analytical-dashboard

Monthly usage / growth dashboard, designed for very large repositories
(billion-document scale).

Layout:
  - Header card   : title + period selector (+ custom date range)
  - KPI strip     : headline numbers for the selected period
  - Slot 1 (hero) : Growth view with tabs
                    Overall     -> documents line + storage bars (one chart)
                    By Doc Type -> pie of documents per primary type
                    By Format   -> pie of documents per mime-type
                    By Size     -> storage added per month (bar, GB/MB auto)
  - Slot 2        : Migration adoption donut (migrated vs non-migrated)
  - Slots 3-6     : reserved (Coming soon)

Shared CSS lives in fid-dashboard-styles.html and is imported below.

=====================================================================
SCALABILITY NOTES (billion-document design)
=====================================================================
Two different mechanisms are used, each chosen for how it scales:

1. CHARTS (growth, storage, type/format breakdown) use nuxeo-repository-data
   aggregations: grouped-by, with-date-intervals, sum(...). These are
   Elasticsearch aggregations — ES computes them across the whole index and
   returns only the buckets (a handful of rows), never the documents. This
   scales to a billion docs by design.

2. MIGRATION COUNTS use nuxeo-page-provider with NXQL and page-size="1",
   reading ONLY resultsCount. This returns a single filtered count without
   fetching documents, so it also scales. We deliberately do NOT count
   migrated docs with a term aggregation (grouped-by on systemName): at scale
   that would need one bucket per distinct source system and, capped by
   group-limit, would silently undercount. A filtered resultsCount is exact
   and scale-safe.

   We avoid the `where` attribute on nuxeo-repository-data entirely: on this
   build it crashes on ranges / LIKE / IS NOT NULL. NXQL inside a page
   provider supports the complex-field IS NOT NULL predicate correctly and
   fails gracefully instead of taking the page down.
=====================================================================
-->

<!-- Import the shared style module so this file stays focused on markup + logic -->
<link rel="import" href="fid-dashboard-styles.html">

<dom-module id="fid-analytical-dashboard">
  <template>
    <!-- iron-flex gives flex helpers; fid-dashboard-styles holds our CSS -->
    <style include="iron-flex iron-flex-alignment nuxeo-styles fid-dashboard-styles"></style>

    <!-- ============================================================
         CHART DATA — Elasticsearch aggregations (scale-safe).
         Re-run automatically when startDate / endDate change.
         ============================================================ -->

    <!-- Documents created per month (Overall line) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      with-date-intervals="month"
      date-field="dc:created"
      data="{{docsPerMonth}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- Storage added per month: sum of file sizes in bytes (Overall bars + By Size) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      with-date-intervals="month"
      date-field="dc:created"
      metrics="sum(file:content.length)"
      data="{{storagePerMonth}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- By Doc Type: documents grouped by primary type (pie + Slot 4) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      grouped-by="ecm:primaryType"
      group-limit="10"
      data="{{byDocType}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- Storage by Doc Type: sum of file sizes grouped by primary type (Slot 5) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      grouped-by="ecm:primaryType"
      group-limit="10"
      metrics="sum(file:content.length)"
      data="{{storageByDocType}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- By Format: documents grouped by mime-type (pie) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      grouped-by="file:content.mime-type"
      group-limit="10"
      data="{{byFormat}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- Total storage over the period: sum of file sizes in bytes (KPI strip) -->
    <nuxeo-repository-data
      start-date="[[startDate]]"
      end-date="[[_extendEndDate(endDate)]]"
      metrics="sum(file:content.length)"
      data="{{totalStorageBytes}}"
      index="[[index]]">
    </nuxeo-repository-data>

    <!-- ============================================================
         COUNTS — NXQL page providers, resultsCount only (scale-safe).

         page-size="1" + reading resultsCount means ES returns the match
         count without fetching documents. Dates are injected as query
         parameters so the counts respect the selected period.
         ============================================================ -->

    <!-- Total documents in the period.
         The full NXQL is built by _totalQuery with the dates already inlined —
         no ? placeholders, so there is nothing for the page provider to
         substitute (placeholders were reaching the server unsubstituted and
         causing a lexical error). The query is empty until both dates exist,
         and `auto` simply does not fire on an empty query. -->
    <nuxeo-page-provider
      auto
      page-size="1"
      query="[[_totalQuery(startDate, endDate)]]"
      current-page="{{_ignoredTotalPage}}"
      results-count="{{totalCount}}">
    </nuxeo-page-provider>

    <!-- Migrated documents in the period: migrationHistory has at least one entry -->
    <nuxeo-page-provider
      auto
      page-size="1"
      query="[[_migratedQuery(startDate, endDate)]]"
      current-page="{{_ignoredMigratedPage}}"
      results-count="{{migratedCount}}">
    </nuxeo-page-provider>

    <!-- ============================================================
         PER-MONTH MIGRATED COUNTS (exact, period-scoped, scale-safe).

         The period is at most 12 months, so we run one count query per
         month. Each is page-size="1" reading results-count, so it returns a
         single number and fetches no documents — cheap at any repository
         size. _months is rebuilt whenever the date range changes; each
         repeated provider writes its month's migrated count back through
         the count handlers, which assemble the monthlyMigrated array the chart
         reads. All-docs-per-month already comes from the dc:created
         histogram (docsPerMonth), so non-migrated = all - migrated.
         ============================================================ -->
    <template is="dom-repeat" items="[[_months]]" as="m">
      <!-- Migrated docs in this month -->
      <nuxeo-page-provider
        auto
        page-size="1"
        query="[[_monthMigratedQuery(m)]]"
        current-page="{{_ignoredMonthPage}}"
        results-count="{{_noopA}}"
        on-results-count-changed="_onMigratedCount">
      </nuxeo-page-provider>
      <!-- Total docs in this month (so non-migrated = total - migrated) -->
      <nuxeo-page-provider
        auto
        page-size="1"
        query="[[_monthTotalQuery(m)]]"
        current-page="{{_ignoredMonthPage2}}"
        results-count="{{_noopB}}"
        on-results-count-changed="_onTotalCount">
      </nuxeo-page-provider>
    </template>

    <!-- ============================================================
         PER-USE-CASE MIGRATED COUNT (Slots 4 & 5).

         Total docs per type come from the byDocType aggregation (already
         fetched). Here we only need the MIGRATED count per type. Each provider
         writes into its own item field (uc.mig) so the change event always
         fires, even when several types share the same count. Migrated defaults
         to 0, so every row always shows a real percentage (0% when none).
         Bounded (<=10 types) and scale-safe.
         ============================================================ -->
    <template is="dom-repeat" items="[[_useCaseTypes]]" as="uc">
      <nuxeo-page-provider
        auto
        page-size="1"
        query="[[_typeMigratedQuery(uc.type, startDate, endDate)]]"
        current-page="{{_ignoredTypePage}}"
        results-count="{{uc.mig}}"
        on-results-count-changed="_onTypeMigratedCount">
      </nuxeo-page-provider>
    </template>

    <!-- ============================================================
         PAGE
         ============================================================ -->
    <div class="page">
      <div class="content">
        <nuxeo-page>

          <!-- Nuxeo admin top bar -->
          <div slot="header">
            <span class="flex">Analytical Dashboard</span>
          </div>

          <div class="dashboard-container">

            <!-- ---------- HEADER CARD: title + period selector ---------- -->
            <nuxeo-card class="dates">
              <div class="header-slot">

                <div class="header-left">
                  <h1>Analytical Dashboard</h1>
                  <p>Nuxeo usage tracking dashboard</p>
                </div>

                <div class="header-divider"></div>

                <div class="header-controls">
                  <div class="period-block">
                    <div class="period-row">
                      <nuxeo-select
                        label="Period"
                        selected="{{selectedPeriod}}"
                        options='["1month","3months","6months","9months","1year","custom"]'
                        on-selected-changed="_onPeriodChanged">
                      </nuxeo-select>
                      <div class="period-info-wrap">
                        <iron-icon class="period-info-icon" icon="icons:info-outline"></iron-icon>
                        <div class="period-tooltip">
                          The period is calculated from today's date and looks back over the number of months you select. For example, choosing 6 months shows activity from the last six months up to today. Use "custom" to pick an exact start and end date.
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Custom date pickers appear only for the custom option -->
                  <template is="dom-if" if="[[_isCustom(selectedPeriod)]]">
                    <div class="custom-dates">
                      <div class="date-field">
                        <label>Start Date</label>
                        <input type="date" value="{{customStart::change}}" />
                      </div>
                      <div class="date-field">
                        <label>End Date</label>
                        <input type="date" value="{{customEnd::change}}" />
                      </div>
                      <div class="date-field">
                        <label>&nbsp;</label>
                        <button type="button" class="custom-submit" on-tap="_applyCustomDates">Apply</button>
                      </div>
                    </div>
                  </template>

                  <!-- ON-DEMAND EMAIL REPORT: sends the current period's summary
                       (numbers + chart images) to a recipient. The actual send
                       happens server-side; this collects the data and POSTs it. -->
                  <div class="email-report-row">
                    <input type="email" class="email-input"
                           placeholder="recipient@fidelity.com"
                           value="{{emailRecipient::input}}" />
                    <button type="button" class="email-btn" on-tap="_emailReport">
                      Email report
                    </button>
                    <span class="email-status">[[emailStatus]]</span>
                  </div>
                </div>

              </div>
            </nuxeo-card>

            <!-- ---------- KPI STRIP: headline numbers ---------- -->
            <div class="flex-layout tight">
              <nuxeo-card class="full-width">
                <div class="kpi-strip">

                  <div class="kpi-cell">
                    <span class="kpi-value">[[_formatCount(totalCount)]]</span>
                    <span class="kpi-label">New documents created</span>
                  </div>

                  <div class="kpi-cell">
                    <span class="kpi-value">[[_formatStorage(totalStorageBytes)]]</span>
                    <span class="kpi-label">of storage added</span>
                  </div>

                  <div class="kpi-cell">
                    <span class="kpi-value">[[_formatCount(migratedCount)]]</span>
                    <span class="kpi-label">From migrated use cases</span>
                  </div>

                  <div class="kpi-cell">
                    <span class="kpi-value">[[_formatNonMigrated(totalCount, migratedCount)]]</span>
                    <span class="kpi-label">From non-migrated use cases</span>
                  </div>

                </div>
              </nuxeo-card>
            </div>

            <!-- ---------- CARD GRID ---------- -->
            <div class="flex-layout">

              <!-- ===== SLOT 1 (hero): Growth view with tabs ===== -->
              <nuxeo-card class="full-width" heading="Growth Overview">

                <!-- Tab toolbar: clicking sets activeView -->
                <div class="view-tabs">
                  <span class$="[[_tabClass(activeView, 'overall')]]" on-tap="_selectOverall">Overall</span>
                  <span class$="[[_tabClass(activeView, 'docType')]]" on-tap="_selectDocType">By Doc Type</span>
                  <span class$="[[_tabClass(activeView, 'format')]]"  on-tap="_selectFormat">By Format</span>
                  <span class$="[[_tabClass(activeView, 'size')]]"    on-tap="_selectSize">By Size</span>
                </div>

                <!-- OVERALL: storage bars + documents line on one chart -->
                <template is="dom-if" if="[[_isView(activeView, 'overall')]]">
                  <div class="chart-sub-title">Documents and storage added per month</div>
                  <div class="chart-box">
                    <chart-bar
                      labels="[[_monthLabels(storagePerMonth)]]"
                      values="[[_overallValues(storagePerMonth, docsPerMonth, totalCount)]]"
                      series="[[_overallSeries(storagePerMonth)]]"
                      options="[[_overallOptions(storagePerMonth)]]">
                    </chart-bar>
                  </div>
                </template>

                <!-- BY DOC TYPE: pie of documents per primary type -->
                <template is="dom-if" if="[[_isView(activeView, 'docType')]]">
                  <div class="chart-sub-title">Documents by type</div>
                  <template is="dom-if" if="[[!_isEmpty(byDocType)]]">
                    <div class="chart-box">
                      <chart-pie
                        labels="[[_labels(byDocType)]]"
                        values="[[_values(byDocType)]]"
                        options='{"responsive":true,"maintainAspectRatio":false,"legend":{"display":true,"position":"right","labels":{"boxWidth":12,"fontSize":11,"padding":10}},"animation":false,"tooltips":{"enabled":true}}'>
                      </chart-pie>
                    </div>
                  </template>
                  <template is="dom-if" if="[[_isEmpty(byDocType)]]">
                    <div class="chart-empty">No documents found in this period</div>
                  </template>
                </template>

                <!-- BY FORMAT: pie of documents per mime-type -->
                <template is="dom-if" if="[[_isView(activeView, 'format')]]">
                  <div class="chart-sub-title">Documents by format</div>
                  <template is="dom-if" if="[[!_isEmpty(byFormat)]]">
                    <div class="chart-box">
                      <chart-pie
                        labels="[[_typeLabels(byFormat)]]"
                        values="[[_values(byFormat)]]"
                        options='{"responsive":true,"maintainAspectRatio":false,"legend":{"display":true,"position":"right","labels":{"boxWidth":12,"fontSize":11,"padding":10}},"animation":false,"tooltips":{"enabled":true}}'>
                      </chart-pie>
                    </div>
                  </template>
                  <template is="dom-if" if="[[_isEmpty(byFormat)]]">
                    <div class="chart-empty">No files found in this period</div>
                  </template>
                </template>

                <!-- BY SIZE: storage added per month (bar, unit auto-scaled) -->
                <template is="dom-if" if="[[_isView(activeView, 'size')]]">
                  <div class="chart-sub-title">Storage added per month</div>
                  <div class="chart-box">
                    <chart-bar
                      labels="[[_monthLabels(storagePerMonth)]]"
                      values="[[_storageValues(storagePerMonth)]]"
                      series="[[_storageSeries(storagePerMonth)]]"
                      options='{"responsive":true,"maintainAspectRatio":false,"legend":{"display":true,"position":"top","labels":{"boxWidth":10,"fontSize":11,"padding":12}},"animation":false,"scales":{"xAxes":[{"gridLines":{"display":false,"drawBorder":false},"ticks":{"autoSkip":false,"maxRotation":30,"fontSize":11,"fontColor":"#9e9e9e"}}],"yAxes":[{"gridLines":{"color":"rgba(0,0,0,0.04)","drawBorder":false},"ticks":{"beginAtZero":true,"fontSize":11,"fontColor":"#9e9e9e"}}]},"tooltips":{"mode":"index","intersect":false}}'>
                    </chart-bar>
                  </div>
                </template>

              </nuxeo-card>
            </div>

            <!-- ---------- ROW: Migration Adoption (1/3) + Monthly Migration (2/3) ---------- -->
            <div class="flex-layout">

              <!-- ===== SLOT 2: Migration adoption donut ===== -->
              <nuxeo-card class="card-onethird" heading="Migration Adoption">
                <div class="donut-wrap">
                  <chart-pie
                    labels="[[_migrationLabels()]]"
                    values="[[_migrationValues(totalCount, migratedCount)]]"
                    colors='["#2e7d32","#d32f2f"]'
                    options='{"responsive":true,"maintainAspectRatio":false,"cutoutPercentage":68,"legend":{"display":true,"position":"bottom","labels":{"boxWidth":12,"fontSize":11,"padding":12}},"animation":false,"tooltips":{"enabled":true}}'>
                  </chart-pie>
                  <div class="donut-center">
                    <span class="pct">[[_migratedPct(totalCount, migratedCount)]]%</span>
                    <span class="pct-label">MIGRATED</span>
                  </div>
                </div>
                <div class="migration-summary">
                  <div class="stat">
                    <span class="num">[[_withCommas(migratedCount)]]</span>
                    <span class="lbl">Migrated</span>
                  </div>
                  <div class="stat">
                    <span class="num">[[_nonMigratedCommas(totalCount, migratedCount)]]</span>
                    <span class="lbl">Non-Migrated</span>
                  </div>
                  <div class="stat">
                    <span class="num">[[_withCommas(totalCount)]]</span>
                    <span class="lbl">Total</span>
                  </div>
                </div>
              </nuxeo-card>

              <!-- ===== SLOT 3 ===== -->
              <!-- ===== Monthly Migrated vs Non-Migrated (full-width) ===== -->
              <nuxeo-card class="card-twothirds" heading="Monthly Migration">
                <div class="chart-sub-title">Migrated vs non-migrated documents per month</div>
                <template is="dom-if" if="[[!_monthlyEmpty(monthlyMigrated)]]">
                  <div class="chart-box">
                    <chart-bar
                      labels="[[_monthlyLabels(monthlyMigrated)]]"
                      values="[[_monthlyValues(monthlyMigrated)]]"
                      series="[[_monthlySeries()]]"
                      colors="[[_monthlyColors()]]"
                      options='{"responsive":true,"maintainAspectRatio":false,"legend":{"display":true,"position":"top","labels":{"boxWidth":10,"fontSize":11,"padding":12}},"animation":false,"scales":{"xAxes":[{"gridLines":{"display":false,"drawBorder":false},"ticks":{"autoSkip":false,"maxRotation":30,"fontSize":11,"fontColor":"#9e9e9e"}}],"yAxes":[{"gridLines":{"color":"rgba(0,0,0,0.04)","drawBorder":false},"ticks":{"beginAtZero":true,"fontSize":11,"fontColor":"#9e9e9e"}}]},"tooltips":{"mode":"index","intersect":false}}'>
                    </chart-bar>
                  </div>
                </template>
                <template is="dom-if" if="[[_monthlyEmpty(monthlyMigrated)]]">
                  <div class="chart-empty">No documents found in this period</div>
                </template>
              </nuxeo-card>
            </div>

            <!-- ---------- ROW: Top 5 Use Cases (50/50) ---------- -->
            <div class="flex-layout">

              <!-- ===== SLOT 4: Top 5 Use Cases by document count ===== -->
              <nuxeo-card class="card-half" heading="Top 5 Use Cases">
                <div class="usecase-subhead">by document volume</div>
                <template is="dom-if" if="[[!_isEmpty(topByDocs)]]">
                  <div class="usecase-list">
                    <div class="usecase-head-row">
                      <span class="uc-rank-h">#</span>
                      <span class="uc-name-h">USE CASE</span>
                      <span class="uc-val-h">DOCS</span>
                      <span class="uc-status-h">MIGRATED %</span>
                    </div>
                    <template is="dom-repeat" items="[[topByDocs]]" as="row">
                      <div class="usecase-row">
                        <span class="uc-rank">[[_inc(index)]]</span>
                        <div class="uc-main">
                          <span class="uc-name">[[row.label]]</span>
                          <div class="uc-bar"><div class="uc-bar-fill" style$="[[_barStyle(row.value, topByDocsMax)]]"></div></div>
                        </div>
                        <span class="uc-val">[[_formatCount(row.value)]]</span>
                        <span class="uc-status">[[_statusPct(row.type, _docCountByType, _statusVersion)]]</span>
                      </div>
                    </template>
                  </div>
                </template>
                <template is="dom-if" if="[[_isEmpty(topByDocs)]]">
                  <div class="chart-empty">No documents found in this period</div>
                </template>
              </nuxeo-card>

              <!-- ===== SLOT 5: Top 5 Use Cases by storage ===== -->
              <nuxeo-card class="card-half" heading="Top 5 Use Cases">
                <div class="usecase-subhead">by storage added</div>
                <template is="dom-if" if="[[!_isEmpty(topByStorage)]]">
                  <div class="usecase-list">
                    <div class="usecase-head-row">
                      <span class="uc-rank-h">#</span>
                      <span class="uc-name-h">USE CASE</span>
                      <span class="uc-val-h">STORAGE</span>
                      <span class="uc-status-h">MIGRATED %</span>
                    </div>
                    <template is="dom-repeat" items="[[topByStorage]]" as="row">
                      <div class="usecase-row">
                        <span class="uc-rank">[[_inc(index)]]</span>
                        <div class="uc-main">
                          <span class="uc-name">[[row.label]]</span>
                          <div class="uc-bar"><div class="uc-bar-fill" style$="[[_barStyle(row.value, topByStorageMax)]]"></div></div>
                        </div>
                        <span class="uc-val">[[_formatStorage(row.value)]]</span>
                        <span class="uc-status">[[_statusPct(row.type, _docCountByType, _statusVersion)]]</span>
                      </div>
                    </template>
                  </div>
                </template>
                <template is="dom-if" if="[[_isEmpty(topByStorage)]]">
                  <div class="chart-empty">No documents found in this period</div>
                </template>
              </nuxeo-card>
            </div>

            <!-- ---------- ROW: Slot 6 ---------- -->
            <div class="flex-layout">

              <!-- ===== SLOT 6 ===== -->
              <nuxeo-card class="full-width" heading="Slot 6">
                <div class="slot-placeholder">
                  <iron-icon icon="icons:insert-chart"></iron-icon>
                  <span class="placeholder-label">Coming soon</span>
                </div>
              </nuxeo-card>

            </div>

          </div>

        </nuxeo-page>
      </div>
    </div>

  </template>

  <script>
    Polymer({
      is: 'fid-analytical-dashboard',
      behaviors: [Nuxeo.LayoutBehavior],

      observers: [
        '_buildMonths(startDate, endDate)',
        '_computeTopByDocs(byDocType)',
        '_computeTopByStorage(storageByDocType)'
      ],

      properties: {

        // ---- Period selection ----
        selectedPeriod: { type: String, value: '1month', observer: '_onPeriodChanged' },
        startDate:      { type: String, notify: true },
        endDate:        { type: String, notify: true },
        customStart:    { type: String },
        customEnd:      { type: String },

        // ---- On-demand email report ----
        emailRecipient: { type: String, value: '' },
        emailStatus:    { type: String, value: '' },

        // ---- Which hero tab is active: overall | docType | format | size ----
        activeView:     { type: String, value: 'overall' },

        // ---- Elasticsearch index ----
        index:          { type: String, value: 'nuxeo' },

        // ---- Chart aggregations ----
        docsPerMonth:      { type: Array,  value: function() { return []; } },
        storagePerMonth:   { type: Array,  value: function() { return []; } },
        byDocType:         { type: Array,  value: function() { return []; } },
        storageByDocType:  { type: Array,  value: function() { return []; } },
        byFormat:          { type: Array,  value: function() { return []; } },
        totalStorageBytes: { type: Number, value: 0 },

        // ---- Top 5 use cases (Slots 4 & 5) ----
        // topByDocs / topByStorage: [{type, label, value}] top-5 lists.
        // *Max: the largest value in each list (for the progress bar width).
        // _docCountByType: {primaryType -> total doc count} from byDocType.
        // _useCaseTypes: [{type, mig}] distinct types across both lists; each
        //   provider writes its migrated count into its own item field (mig).
        // _typeMigrated: {primaryType -> migrated count}, defaults missing to 0.
        // _statusVersion: bumped when a migrated count arrives, so the pct
        //   helpers recompute.
        topByDocs:         { type: Array,  value: function() { return []; } },
        topByStorage:      { type: Array,  value: function() { return []; } },
        topByDocsMax:      { type: Number, value: 0 },
        topByStorageMax:   { type: Number, value: 0 },
        _docCountByType:   { type: Object, value: function() { return {}; } },
        _useCaseTypes:     { type: Array,  value: function() { return []; } },
        _typeMigrated:     { type: Object, value: function() { return {}; } },
        _statusVersion:    { type: Number, value: 0 },

        // ---- Migration counts (page-provider resultsCount) ----
        totalCount:        { type: Number, value: 0 },
        migratedCount:     { type: Number, value: 0 },

        // ---- Per-month migrated counts ----
        // _months: one entry per month in the period, each carrying its
        //   own date bounds, label, and live migrated count.
        // monthlyMigrated: the assembled [{key,label,migrated,all}] the
        //   monthly chart reads, rebuilt as month counts arrive.
        _months:           { type: Array, value: function() { return []; } },
        monthlyMigrated:   { type: Array, value: function() { return []; } },

        // current-page targets are required by nuxeo-page-provider but unused;
        // we only read results-count (the total match count)
        _ignoredTotalPage:    { type: Array },
        _ignoredMigratedPage: { type: Array },
        _ignoredMonthPage:    { type: Array },
        _ignoredMonthPage2:   { type: Array },
        _ignoredTypePage:     { type: Array },
        _noopA:               { type: Number },
        _noopB:               { type: Number }

      },

      // Compute the initial date range once the element is ready
      ready: function() {
        this._computeDates(this.selectedPeriod);
      },

      /* ==========================================================
         PERIOD LOGIC
         ========================================================== */

      _isCustom: function(period) {
        return period === 'custom';
      },

      // Fires when the dropdown changes
      _onPeriodChanged: function(newVal) {
        if (!newVal || newVal === 'custom') return;
        this._computeDates(newVal);
      },

      // Turn a period option into start/end dates (today minus N months .. today)
      _computeDates: function(period) {
        var monthMap = {
          '1month': 1, '3months': 3, '6months': 6, '9months': 9, '1year': 12
        };
        var months = monthMap[period];
        if (!months) return;

        var end   = new Date();
        var start = new Date();
        start.setMonth(start.getMonth() - months);

        this.startDate = this._toISODate(start);
        this.endDate   = this._toISODate(end);
      },

      // Applies the custom range only when the Apply button is clicked; needs
      // both ends filled. Same assignment as before, just triggered on click.
      _applyCustomDates: function() {
        if (this.customStart && this.customEnd) {
          this.startDate = this.customStart;
          this.endDate   = this.customEnd;
        }
      },

      // ---- On-demand email report (Option 1: no scripting operation) ----
      // The scripting engine on this instance can't run (Nashorn "global is
      // null"), so we do everything with the browser + the built-in
      // Notification.SendMail operation, which is proven to work:
      //   1. build the HTML email body here in the browser,
      //   2. export each chart to a PNG blob and batch-upload them to Nuxeo,
      //   3. call Notification.SendMail with the HTML + the uploaded chart
      //      blobs as attachments, using the repository root as input.
      _emailReport: function() {
        var self = this;
        var email = (this.emailRecipient || '').trim();
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
          this.emailStatus = 'Enter a valid email address.';
          return;
        }
        this.emailStatus = 'Preparing report…';

        // ----- numbers -----
        var total = this.totalCount || 0;
        var migrated = this.migratedCount || 0;
        var nonMig = (total - migrated) > 0 ? (total - migrated) : 0;
        var pct = total ? Math.round((migrated / total) * 100) : 0;

        function withCommas(n) { return ('' + (n || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
        function fmtStorage(b) {
          b = b || 0;
          if (b >= 1073741824) return (Math.round(b / 107374182.4) / 10) + ' GB';
          if (b >= 1048576)    return (Math.round(b / 104857.6) / 10) + ' MB';
          if (b >= 1024)       return (Math.round(b / 102.4) / 10) + ' KB';
          return b + ' B';
        }

        // ----- HTML body (built entirely in the browser) -----
        var html = '<div style="font-family:Arial,sans-serif;color:#20302A;">'
          + '<h2 style="color:#1E5631;margin:0 0 4px;">Nuxeo Usage Report</h2>'
          + '<p style="color:#5A6560;margin:0 0 16px;">Period: ' + (this.startDate || '') + ' to ' + (this.endDate || '') + '</p>'
          + '<table cellpadding="8" style="border-collapse:collapse;font-size:14px;">'
          + '<tr><td style="border-bottom:1px solid #eee;"><b>New documents</b></td><td style="border-bottom:1px solid #eee;">' + withCommas(total) + '</td></tr>'
          + '<tr><td style="border-bottom:1px solid #eee;"><b>Storage added</b></td><td style="border-bottom:1px solid #eee;">' + fmtStorage(this.totalStorageBytes) + '</td></tr>'
          + '<tr><td style="border-bottom:1px solid #eee;"><b>Migrated</b></td><td style="border-bottom:1px solid #eee;">' + withCommas(migrated) + ' (' + pct + '%)</td></tr>'
          + '<tr><td><b>Non-migrated</b></td><td>' + withCommas(nonMig) + '</td></tr>'
          + '</table>'
          + '<p style="color:#5A6560;font-size:12px;margin-top:16px;">Charts are attached to this email.</p>'
          + '</div>';

        // ----- collect chart canvases -----
        var chartEls = Polymer.dom(this.root).querySelectorAll('chart-bar, chart-pie, chart-line');
        var canvases = [];
        var seen = [];
        Array.prototype.forEach.call(chartEls, function(el) {
          var c = null;
          try {
            c = el.querySelector ? el.querySelector('canvas') : null;
            if (!c && el.shadowRoot) { c = el.shadowRoot.querySelector('canvas'); }
          } catch (e) { c = null; }
          if (c && seen.indexOf(c) === -1) { seen.push(c); canvases.push(c); }
        });

        // Turn a canvas into a PNG Blob (Promise).
        function canvasToBlob(canvas) {
          return new Promise(function(resolve) {
            try {
              if (canvas.toBlob) {
                canvas.toBlob(function(b) { resolve(b); }, 'image/png');
              } else {
                // fallback: data URL -> Blob
                var dataUrl = canvas.toDataURL('image/png');
                var parts = dataUrl.split(',');
                var bin = atob(parts[1]);
                var arr = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) { arr[i] = bin.charCodeAt(i); }
                resolve(new Blob([arr], { type: 'image/png' }));
              }
            } catch (e) { resolve(null); }
          });
        }

        // ----- the send flow -----
        this.emailStatus = 'Uploading charts…';

        // 1. create a batch
        fetch('/nuxeo/api/v1/upload/', { method: 'POST', credentials: 'include' })
          .then(function(r) {
            if (!r.ok) throw new Error('batch create failed ' + r.status);
            return r.json();
          })
          .then(function(batch) {
            var batchId = batch.batchId || batch['batchId'];
            // 2. upload each chart blob to the batch
            var uploads = canvases.map(function(canvas, idx) {
              return canvasToBlob(canvas).then(function(blob) {
                if (!blob) return null;
                return fetch('/nuxeo/api/v1/upload/' + batchId + '/' + idx, {
                  method: 'POST',
                  credentials: 'include',
                  headers: {
                    'Content-Type': 'image/png',
                    'X-Upload-Type': 'normal',
                    'X-File-Name': 'chart' + idx + '.png'
                  },
                  body: blob
                }).then(function(u) { return u.ok ? idx : null; });
              });
            });
            return Promise.all(uploads).then(function(results) {
              var ok = results.filter(function(x) { return x !== null; });
              return { batchId: batchId, count: ok.length };
            });
          })
          .then(function(info) {
            // 3. call the built-in Notification.SendMail with the HTML + the
            //    uploaded chart blobs as attachments. "files" references the
            //    batch blobs; input is the repository root document.
            self.emailStatus = 'Sending…';
            var fileRefs = [];
            for (var i = 0; i < info.count; i++) {
              fileRefs.push('batch:' + info.batchId + ':' + i);
            }
            var body = {
              input: 'doc:/',
              params: {
                to: [email],
                subject: 'Nuxeo Usage Report - ' + (self.startDate || '') + ' to ' + (self.endDate || ''),
                message: html,
                HTML: true,
                rollbackOnError: false,
                files: fileRefs
              }
            };
            return fetch('/nuxeo/api/v1/automation/Notification.SendMail', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
              credentials: 'include',
              body: JSON.stringify(body)
            });
          })
          .then(function(resp) {
            if (resp.ok || resp.status === 204) {
              self.emailStatus = 'Report sent to ' + email;
            } else {
              resp.text().then(function(t) {
                if (window && window.console) { console.error('SendMail failed', resp.status, t); }
              });
              self.emailStatus = 'Send failed (' + resp.status + '). See console.';
            }
          })
          .catch(function(err) {
            if (window && window.console) { console.error('Email report error', err); }
            self.emailStatus = 'Send failed. See console for detail.';
          });
      },

      // Date -> "YYYY-MM-DD"
      _toISODate: function(date) {
        return date.toISOString().split('T')[0];
      },

      // Push the end date to the end of that day so ES includes today's docs
      _extendEndDate: function(date) {
        if (!date) return date;
        var d = new Date(date);
        d.setDate(d.getDate() + 1);
        d.setMilliseconds(d.getMilliseconds() - 1);
        return d.toISOString().split('T')[0];
      },

      // Build the full NXQL for the total-documents count, dates inlined as
      // TIMESTAMP literals. Returns '' until both dates exist so the page
      // provider's `auto` does not fire on an empty/partial query.
      _totalQuery: function(startDate, endDate) {
        var range = this._dateRangeClause(startDate, endDate);
        if (!range) return '';
        return "SELECT * FROM Document WHERE ecm:isVersion = 0 " +
               "AND ecm:isTrashed = 0 " + range;
      },

      // Same as above, plus the migrated predicate (migrationHistory non-empty)
      _migratedQuery: function(startDate, endDate) {
        var range = this._dateRangeClause(startDate, endDate);
        if (!range) return '';
        return "SELECT * FROM Document WHERE ecm:isVersion = 0 " +
               "AND ecm:isTrashed = 0 " + range +
               " AND fid_migration:migrationHistory/*/systemName IS NOT NULL";
      },

      // Shared date-range clause: dc:created between two TIMESTAMP literals.
      // NXQL matches date fields against full timestamps, so we format both
      // ends as 'YYYY-MM-DD HH:MM:SS' rather than bare dates.
      _dateRangeClause: function(startDate, endDate) {
        if (!startDate || !endDate) return '';
        var start = this._toTimestamp(startDate, false);
        var end   = this._toTimestamp(endDate, true);
        return "AND dc:created BETWEEN TIMESTAMP '" + start +
               "' AND TIMESTAMP '" + end + "'";
      },

      // "YYYY-MM-DD" -> "YYYY-MM-DD 00:00:00" (start) or
      //                 "YYYY-MM-DD 23:59:59" (end, inclusive of the whole day)
      _toTimestamp: function(date, isEnd) {
        if (!date) return date;
        var day = String(date).split('T')[0];
        return day + (isEnd ? ' 23:59:59' : ' 00:00:00');
      },

      /* ==========================================================
         PER-MONTH MIGRATION BUCKETS

         _buildMonths runs whenever the date range changes. It splits the
         selected period into calendar months and creates one descriptor per
         month: { key, label, start, end, migrated, all }. Each descriptor
         feeds one page-provider (via dom-repeat) that fills `migrated`
         exactly for that month. `all` is filled from the dc:created
         histogram. The monthly chart reads monthlyMigrated, assembled by
         the count handlers / _refreshMonthly.
         ========================================================== */

      // Rebuild the month descriptors for the current [startDate, endDate].
      _buildMonths: function(startDate, endDate) {
        if (!startDate || !endDate) { this._months = []; return; }

        // Parse "YYYY-MM-DD" into a LOCAL date (new Date("YYYY-MM-DD") parses as
        // UTC, which shifts the month by one in timezones behind UTC and made
        // the chart drop the last month / start a month early).
        var start = this._parseLocal(startDate);
        var end   = this._parseLocal(endDate);
        var months = [];

        // Walk month by month from the start month to the end month.
        var cursor = new Date(start.getFullYear(), start.getMonth(), 1);
        var last   = new Date(end.getFullYear(), end.getMonth(), 1);

        while (cursor <= last) {
          var y = cursor.getFullYear();
          var mo = cursor.getMonth();                 // 0-based
          var firstOfMonth = new Date(y, mo, 1);
          var lastOfMonth  = new Date(y, mo + 1, 0);  // day 0 of next month = last day

          // Clamp to the actual selected range at the edges.
          var mStart = firstOfMonth < start ? start : firstOfMonth;
          var mEnd   = lastOfMonth  > end   ? end   : lastOfMonth;

          months.push({
            key:      this._toISOLocal(firstOfMonth),       // e.g. 2026-03-01
            label:    this._toMonthYear(this._toISOLocal(firstOfMonth)),
            start:    this._toTimestamp(this._toISOLocal(mStart), false),
            end:      this._toTimestamp(this._toISOLocal(mEnd), true),
            migrated: 0,
            all:      0
          });

          cursor.setMonth(cursor.getMonth() + 1);
        }

        this._months = months;
        this._refreshMonthly();
      },

      // Parse "YYYY-MM-DD" (or an ISO datetime) into a LOCAL-time Date, so month
      // boundaries match the user's calendar rather than UTC.
      _parseLocal: function(dateStr) {
        var datePart = String(dateStr).split('T')[0];
        var p = datePart.split('-');
        var y = parseInt(p[0], 10);
        var mo = parseInt(p[1], 10) - 1;
        var d = parseInt(p[2], 10);
        return new Date(y, mo, d);
      },

      // Format a Date as "YYYY-MM-DD" using its LOCAL parts (not UTC), so the
      // month keys/labels/timestamps match the calendar the user sees.
      _toISOLocal: function(date) {
        var y = date.getFullYear();
        var mo = String(date.getMonth() + 1);
        var d = String(date.getDate());
        if (mo.length < 2) mo = '0' + mo;
        if (d.length < 2) d = '0' + d;
        return y + '-' + mo + '-' + d;
      },

      // NXQL for one month's migrated count (dates already inlined).
      _monthMigratedQuery: function(m) {
        if (!m || !m.start || !m.end) return '';
        return "SELECT * FROM Document WHERE ecm:isVersion = 0 " +
               "AND ecm:isTrashed = 0 " +
               "AND dc:created BETWEEN TIMESTAMP '" + m.start +
               "' AND TIMESTAMP '" + m.end + "' " +
               "AND fid_migration:migrationHistory/*/systemName IS NOT NULL";
      },

      // NXQL for one month's TOTAL document count (same filters, no migration
      // predicate). Used so non-migrated = total - migrated comes purely from
      // queries, with no dependence on aggregation histogram key formats.
      _monthTotalQuery: function(m) {
        if (!m || !m.start || !m.end) return '';
        return "SELECT * FROM Document WHERE ecm:isVersion = 0 " +
               "AND ecm:isTrashed = 0 " +
               "AND dc:created BETWEEN TIMESTAMP '" + m.start +
               "' AND TIMESTAMP '" + m.end + "'";
      },

      // Per-month providers report their count via the change EVENT, and we
      // write it onto the correct month with e.model.set(...) — the
      // notification-aware path. A plain {{m.all}} two-way binding inside
      // dom-repeat mutates the item object WITHOUT notifying Polymer, so the
      // _months.* observer never fires and the chart stays stale. Reading the
      // value from e.detail.value and writing via e.model.set fixes that.

      _onMigratedCount: function(e) {
        if (!e || !e.model || !e.detail) return;
        var val = e.detail.value;
        if (typeof val !== 'number') return;
        e.model.set('m.migrated', val);
        this._refreshMonthly();
      },

      _onTotalCount: function(e) {
        if (!e || !e.model || !e.detail) return;
        var val = e.detail.value;
        if (typeof val !== 'number') return;
        e.model.set('m.all', val);
        this._refreshMonthly();
      },

      // Assemble monthlyMigrated straight from the per-month query results.
      // Each month descriptor carries its own `migrated` and `all` counts.
      // Non-migrated = all - migrated. No histogram, no key matching.
      _refreshMonthly: function() {
        var rows = (this._months || []).map(function(m) {
          var migrated = m.migrated || 0;
          var all = m.all || 0;
          if (migrated > all) all = migrated; // safety: never negative
          return {
            key:          m.key,
            label:        m.label,
            migrated:     migrated,
            nonMigrated:  all - migrated,
            all:          all
          };
        });
        this.monthlyMigrated = rows;
      },

      /* ==========================================================
         TAB LOGIC
         ========================================================== */

      // True when the given view is active (used by dom-if)
      _isView: function(active, view) {
        return active === view;
      },

      // Returns the css class for a tab, adding "active" when selected
      _tabClass: function(active, view) {
        return active === view ? 'view-tab active' : 'view-tab';
      },

      _selectOverall: function() { this.activeView = 'overall'; },
      _selectDocType: function() { this.activeView = 'docType'; },
      _selectFormat:  function() { this.activeView = 'format'; },
      _selectSize:    function() { this.activeView = 'size'; },

      /* ==========================================================
         GENERIC CHART HELPERS
         ES returns buckets like: [{ key: "...", value: N }, ...]
         ========================================================== */

      // True when an aggregation came back empty
      _isEmpty: function(data) {
        return !data || !data.length;
      },

      // Labels straight from bucket keys
      _labels: function(data) {
        if (!data || !data.length) return [];
        return data.map(function(entry) { return entry.key; });
      },

      // Values nested as chart-elements expects: [[v1, v2, ...]]
      _values: function(data) {
        if (!data || !data.length) return [[]];
        return [data.map(function(entry) { return entry.value; })];
      },

      // X-axis labels formatted as "Mon-YY" (e.g. 2026-03-01 -> Mar-26)
      _monthLabels: function(data) {
        if (!data || !data.length) return [];
        var self = this;
        return data.map(function(entry) { return self._toMonthYear(entry.key); });
      },

      // Normalise any month-bucket key to "Mon-YY" (e.g. "Mar-26").
      // Handles three formats the histogram may emit:
      //   - "2026-03-01" or "2026-03"  (dash-separated date)
      //   - "2026-03-01T00:00:00.000Z" (full ISO datetime)
      //   - 1740787200000              (epoch milliseconds, number or string)
      _toMonthYear: function(key) {
        if (key === null || typeof key === 'undefined' || key === '') return '';
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        // Pure number (or numeric string) that is not a dash-date => epoch ms.
        var str = String(key);
        if (/^\d{10,}$/.test(str)) {
          var dms = new Date(parseInt(str, 10));
          if (!isNaN(dms.getTime())) {
            return months[dms.getMonth()] + '-' + String(dms.getFullYear()).slice(-2);
          }
        }

        // Dash-separated date or ISO datetime: take the date part before 'T'.
        var datePart = str.split('T')[0];
        var parts = datePart.split('-');
        if (parts.length >= 2) {
          var year = parts[0];
          var monthIdx = parseInt(parts[1], 10) - 1;
          if (monthIdx >= 0 && monthIdx <= 11 && year.length === 4) {
            return months[monthIdx] + '-' + year.slice(-2);
          }
        }

        // Last resort: let Date try to parse it.
        var d = new Date(str);
        if (!isNaN(d.getTime())) {
          return months[d.getMonth()] + '-' + String(d.getFullYear()).slice(-2);
        }
        return str;
      },

      /* ==========================================================
         OVERALL VIEW  (storage bars + documents line, one chart)

         Two datasets share the month axis:
           - dataset 0 : storage, bars on the left axis
           - dataset 1 : documents, line on the right axis
         Documents are aligned to the storage month keys so both line up.
         ========================================================== */

      // Documents aligned to the storage month keys
      _docsAlignedToStorage: function(storage, docs) {
        var docMap = {};
        (docs || []).forEach(function(entry) { docMap[entry.key] = entry.value; });
        return (storage || []).map(function(entry) {
          return docMap[entry.key] || 0;
        });
      },

      // Reconcile per-month document counts (from the dc:created histogram,
      // which does not exclude versions/trashed) to the authoritative period
      // total from the page provider (which does). We keep each month's shape
      // but scale so the series sums to totalCount, then push any rounding
      // drift onto the busiest month so the displayed bars add up exactly to
      // the KPI total. This keeps the whole dashboard telling one number.
      _reconcileDocs: function(rawMonthly, authoritativeTotal) {
        var aggTotal = rawMonthly.reduce(function(s, v) { return s + v; }, 0);
        if (!authoritativeTotal || aggTotal === 0 || aggTotal === authoritativeTotal) {
          return rawMonthly;
        }
        var factor = authoritativeTotal / aggTotal;
        var scaled = rawMonthly.map(function(v) { return Math.round(v * factor); });

        var scaledTotal = scaled.reduce(function(s, v) { return s + v; }, 0);
        var drift = authoritativeTotal - scaledTotal;
        if (drift !== 0 && scaled.length) {
          var maxIdx = 0;
          for (var i = 1; i < scaled.length; i++) {
            if (scaled[i] > scaled[maxIdx]) maxIdx = i;
          }
          scaled[maxIdx] += drift;
          if (scaled[maxIdx] < 0) scaled[maxIdx] = 0;
        }
        return scaled;
      },

      // [[storageInUnit...], [docs...]] — both series are grouped bars.
      // Storage is exact per month; documents are reconciled so the bars sum
      // to the KPI's period total (totalCount).
      _overallValues: function(storage, docs, total) {
        if (!storage || !storage.length) return [[]];
        // Overall chart shows storage in MB (fixed unit) so the storage bars
        // stay visible next to the much larger document counts. The value is
        // still computed live from the actual bytes each render (dynamic),
        // just always expressed in MB for THIS chart. Other charts keep the
        // auto-scaled unit via _storageUnit.
        var MB = 1048576;
        var storageVals = storage.map(function(entry) {
          var v = (entry.value || 0) / MB;
          return Math.round(v * 100) / 100;
        });
        var rawDocs = this._docsAlignedToStorage(storage, docs);
        var docVals = this._reconcileDocs(rawDocs, total);
        return [storageVals, docVals];
      },

      // Legend labels: Overall chart fixes storage to MB (see _overallValues).
      _overallSeries: function(storage) {
        return ['Storage added in (MB)', 'Number of documents created'];
      },

      // Options object: dataset 1 (documents) renders as a line on the right axis
      // Both datasets (storage + documents) render as grouped bars on ONE
      // shared Y-axis. We do NOT use a second axis: chart-elements builds its
      // datasets internally, so a per-dataset line type / second axis can't be
      // injected reliably, and an unused second axis falls back to a 0-1 scale.
      // One axis keeps both bars readable and avoids that phantom scale.
      _overallOptions: function(storage) {
        return {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          legend: {
            display: true,
            position: 'top',
            labels: { boxWidth: 10, fontSize: 11, padding: 12 }
          },
          scales: {
            xAxes: [{
              gridLines: { display: false, drawBorder: false },
              ticks: { autoSkip: false, maxRotation: 30, fontSize: 11, fontColor: '#9e9e9e' }
            }],
            yAxes: [{
              gridLines: { color: 'rgba(0,0,0,0.04)', drawBorder: false },
              ticks: { beginAtZero: true, fontSize: 11, fontColor: '#9e9e9e' }
            }]
          },
          tooltips: { mode: 'index', intersect: false }
        };
      },

      /* ==========================================================
         STORAGE HELPERS  (bytes -> KB/MB/GB/TB, auto-scaled)
         ========================================================== */

      // Largest monthly value, used to choose a display unit
      _storageMax: function(data) {
        if (!data || !data.length) return 0;
        return data.reduce(function(max, entry) {
          var v = entry.value || 0;
          return v > max ? v : max;
        }, 0);
      },

      // Pick a unit so small test data is not rounded down to zero
      _storageUnit: function(data) {
        var max = this._storageMax(data);
        if (max >= 1099511627776) return { name: 'TB', divisor: 1099511627776 };
        if (max >= 1073741824)    return { name: 'GB', divisor: 1073741824 };
        if (max >= 1048576)       return { name: 'MB', divisor: 1048576 };
        return { name: 'KB', divisor: 1024 };
      },

      // Per-month storage converted into the chosen unit
      _storageValues: function(data) {
        if (!data || !data.length) return [[]];
        var unit = this._storageUnit(data);
        return [data.map(function(entry) {
          var v = (entry.value || 0) / unit.divisor;
          return Math.round(v * 100) / 100;
        })];
      },

      // Legend label reflecting the chosen unit, e.g. "Storage (MB)"
      _storageSeries: function(data) {
        return ['Storage (' + this._storageUnit(data).name + ')'];
      },

      /* ==========================================================
         FORMAT / MIME HELPERS  (By Format pie)
         ========================================================== */

      // Friendly labels for the By Format pie
      _typeLabels: function(data) {
        if (!data || !data.length) return [];
        var self = this;
        return data.map(function(entry) { return self._friendlyType(entry.key); });
      },

      // Map a mime-type to a short readable name
      _friendlyType: function(mime) {
        if (!mime) return 'Unknown';
        var map = {
          'application/pdf': 'PDF',
          'image/png': 'PNG Image',
          'image/jpeg': 'JPEG Image',
          'image/gif': 'GIF Image',
          'text/plain': 'Text',
          'video/mp4': 'MP4 Video',
          'application/msword': 'Word',
          'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'Word',
          'application/vnd.ms-excel': 'Excel',
          'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'Excel',
          'application/zip': 'ZIP Archive'
        };
        if (map[mime]) return map[mime];
        var parts = mime.split('/');
        return parts.length > 1 ? parts[1].toUpperCase() : mime;
      },

      /* ==========================================================
         MIGRATION HELPERS

         totalCount and migratedCount come from page-provider resultsCount
         (filtered counts, scale-safe). Non-migrated is the difference.
         ========================================================== */

      _migrationLabels: function() {
        return ['Migrated', 'Non-Migrated'];
      },

      // Non-migrated = total - migrated, never negative
      _nonMigrated: function(total, migrated) {
        var diff = (total || 0) - (migrated || 0);
        return diff > 0 ? diff : 0;
      },
      // Add thousands separators dynamically for any size (e.g. 15416 -> 15,416,
      // 12345678 -> 12,345,678). International grouping (groups of 3).
      _withCommas: function(n) {
        n = n || 0;
        return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      },
      // Non-migrated (computed) with commas — single helper, no nested binding.
      _nonMigratedCommas: function(total, migrated) {
        var diff = (total || 0) - (migrated || 0);
        if (diff < 0) diff = 0;
        return String(diff).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      },
      _formatNonMigrated: function(total, migrated) {
        var n = (total || 0) - (migrated || 0);
        if (n < 0) n = 0;
        if (n >= 1000000000) return (Math.round(n / 100000000) / 10) + 'B';
        if (n >= 1000000)    return (Math.round(n / 100000) / 10) + 'M';
        if (n >= 1000)       return (Math.round(n / 100) / 10) + 'K';
        return String(n);
      },

      // Donut values: [[migrated, nonMigrated]]
      _migrationValues: function(total, migrated) {
        return [[migrated || 0, this._nonMigrated(total, migrated)]];
      },

      // Migrated share of total, whole number
      _migratedPct: function(total, migrated) {
        var t = total || 0;
        if (t <= 0) return 0;
        return Math.round(((migrated || 0) / t) * 100);
      },

      /* ==========================================================
         MONTHLY MIGRATED vs NON-MIGRATED  (new chart)

         Reads monthlyMigrated: [{label, migrated, nonMigrated, all}, ...].
         Same two-series grouped-bar shape as the Overall chart, but the
         series are Migrated and Non-Migrated per month.
         ========================================================== */

      // True when there are no month rows yet
      _monthlyEmpty: function(rows) {
        return !rows || !rows.length;
      },

      // X-axis labels: one per month, e.g. "Mar-26"
      _monthlyLabels: function(rows) {
        if (!rows || !rows.length) return [];
        return rows.map(function(r) { return r.label; });
      },

      // Two series: [[migrated per month...], [nonMigrated per month...]]
      _monthlyValues: function(rows) {
        if (!rows || !rows.length) return [[]];
        var migrated    = rows.map(function(r) { return r.migrated || 0; });
        var nonMigrated = rows.map(function(r) { return r.nonMigrated || 0; });
        return [migrated, nonMigrated];
      },

      // Legend labels
      _monthlySeries: function() {
        return ['Migrated', 'Non-Migrated'];
      },

      // Green (migrated) + red (non-migrated) to match the donut
      _monthlyColors: function() {
        return ['#2e7d32', '#d32f2f'];
      },

      /* ==========================================================
         TOP 5 USE CASES (Slots 4 & 5)

         Use case = ecm:primaryType. Slot 4 ranks by document count
         (byDocType), Slot 5 by storage added (storageByDocType). For each
         row we also show a migration status: "Migrated" only when every
         document of that type in the period is migrated, else "Not Yet".
         The status counts come from bounded per-type page providers.
         ========================================================== */

      // Build the top-5 by document count. Also caches the total doc count per
      // type (used for the migrated %), then refreshes the type list.
      _computeTopByDocs: function(data) {
        var map = {};
        (data || []).forEach(function(entry) {
          if (entry && entry.key) map[entry.key] = entry.value || 0;
        });
        this._docCountByType = map;
        var top = this._topN(data, 5);
        this.topByDocs = top;
        this.topByDocsMax = top.length ? top[0].value : 0;
        this._rebuildUseCaseTypes();
        // Nudge the pct helpers now that totals are known.
        this._statusVersion++;
      },

      // Build the top-5 by storage, then refresh the type list.
      _computeTopByStorage: function(data) {
        var top = this._topN(data, 5);
        this.topByStorage = top;
        this.topByStorageMax = top.length ? top[0].value : 0;
        this._rebuildUseCaseTypes();
      },

      // Generic: sort buckets by value desc, take N, shape to {type,label,value}.
      _topN: function(data, n) {
        if (!data || !data.length) return [];
        var self = this;
        var copy = data.slice().sort(function(a, b) {
          return (b.value || 0) - (a.value || 0);
        });
        return copy.slice(0, n).map(function(entry) {
          return {
            type:  entry.key,
            label: self._friendlyDocType(entry.key),
            value: entry.value || 0
          };
        });
      },

      // Friendly display name for a primary type (fallbacks to the raw type).
      _friendlyDocType: function(type) {
        if (!type) return 'Unknown';
        var map = {
          'File': 'File',
          'Note': 'Note',
          'Picture': 'Picture',
          'Video': 'Video',
          'Audio': 'Audio',
          'BrokerageServiceDoc': 'Brokerage Service Doc'
        };
        if (map[type]) return map[type];
        // Insert spaces before capitals for camelCase type names.
        return String(type).replace(/([a-z])([A-Z])/g, '$1 $2');
      },

      // Distinct primary types across both top-5 lists, as {type, mig} objects
      // (each provider writes its migrated count into its own mig field).
      // Rebuilt only when the set of types actually changes, to avoid thrashing
      // the providers.
      _rebuildUseCaseTypes: function() {
        var seen = {};
        var types = [];
        (this.topByDocs || []).concat(this.topByStorage || []).forEach(function(r) {
          if (r && r.type && !seen[r.type]) { seen[r.type] = true; types.push(r.type); }
        });
        var current = (this._useCaseTypes || []).map(function(o) { return o.type; });
        if (current.join('|') === types.join('|')) return; // unchanged
        this._useCaseTypes = types.map(function(t) { return { type: t, mig: 0 }; });
      },

      // NXQL: migrated docs of a given primary type in the period.
      _typeMigratedQuery: function(t, startDate, endDate) {
        var range = this._dateRangeClause(startDate, endDate);
        if (!range || !t) return '';
        return "SELECT * FROM Document WHERE ecm:isVersion = 0 " +
               "AND ecm:isTrashed = 0 " + range +
               " AND ecm:primaryType = '" + t + "'" +
               " AND fid_migration:migrationHistory/*/systemName IS NOT NULL";
      },

      // A per-type migrated count arrived. Store it (default 0) and bump the
      // version so the pct helpers recompute.
      _onTypeMigratedCount: function(e) {
        if (!e || !e.model || !e.model.uc || !e.detail) return;
        var val = e.detail.value;
        if (typeof val !== 'number') return;
        var type = e.model.uc.type;
        var map = {};
        var src = this._typeMigrated || {};
        for (var k in src) { if (src.hasOwnProperty(k)) map[k] = src[k]; }
        map[type] = val;
        this._typeMigrated = map;
        this._statusVersion++;
      },

      // Row number (index is 0-based).
      _inc: function(index) {
        return index + 1;
      },

      // Progress-bar inline width as a percentage of the list maximum.
      _barStyle: function(value, max) {
        var pct = (max && max > 0) ? Math.round((value / max) * 100) : 0;
        if (pct < 4 && value > 0) pct = 4; // keep a sliver visible
        return 'width:' + pct + '%';
      },

      // Migrated percentage for a type. Total comes from the byDocType
      // aggregation (docCount map); migrated defaults to 0 if not yet counted.
      // Always returns a real number so every row shows a percentage.
      _statusPct: function(type, docCount, _v) {
        var total = (docCount || {})[type] || 0;
        if (total <= 0) return '0%';
        var migrated = (this._typeMigrated || {})[type] || 0;
        var pct = Math.round((migrated / total) * 100);
        return pct + '%';
      },

      /* ==========================================================
         KPI FORMATTING
         ========================================================== */

      // 204000 -> "204K", 1500000 -> "1.5M", 2300000000 -> "2.3B"
      _formatCount: function(n) {
        n = n || 0;
        if (n >= 1000000000) return (Math.round(n / 100000000) / 10) + 'B';
        if (n >= 1000000)    return (Math.round(n / 100000) / 10) + 'M';
        if (n >= 1000)       return (Math.round(n / 100) / 10) + 'K';
        return String(n);
      },

      // bytes -> "1.4 TB" / "512 MB" etc. for the KPI cell
      _formatStorage: function(bytes) {
        bytes = bytes || 0;
        if (bytes >= 1125899906842624) return (Math.round(bytes / 1125899906842624 * 10) / 10) + ' PB';
        if (bytes >= 1099511627776)    return (Math.round(bytes / 1099511627776 * 10) / 10) + ' TB';
        if (bytes >= 1073741824)       return (Math.round(bytes / 1073741824 * 10) / 10) + ' GB';
        if (bytes >= 1048576)          return (Math.round(bytes / 1048576 * 10) / 10) + ' MB';
        if (bytes >= 1024)             return (Math.round(bytes / 1024 * 10) / 10) + ' KB';
        return bytes + ' B';
      }

    });
  </script>

</dom-module>
