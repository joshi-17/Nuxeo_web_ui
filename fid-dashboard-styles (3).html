<!--
`fid-dashboard-styles`

Shared style module for fid-analytical-dashboard.
Imported by the main element via:
  <link rel="import" href="fid-dashboard-styles.html">
  <style include="... fid-dashboard-styles"></style>

Keeps all CSS in one place so the main file stays focused on markup + logic.
Page background is green; cards stay the default Nuxeo white.
-->
<dom-module id="fid-dashboard-styles">
  <template>
    <style>

      /* ---------- Base layout ---------- */
      .page,
      .content {
        @apply --layout-vertical;
      }

      /* Page background matches the rest of Nuxeo; cards stay white */
      .dashboard-container {
        padding: 16px 24px 32px 24px;
        background: var(--nuxeo-page-background, #f0f2f5);
        min-height: 100vh;
        box-sizing: border-box;
      }

      /* ---------- Header card: title left, divider, controls right ---------- */
      .header-slot {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        flex-wrap: nowrap;
        gap: 24px;
        padding: 8px 4px;
      }

      .header-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .header-left h1 {
        font-size: 20px;
        font-weight: 500;
        color: var(--nuxeo-text-default, #212121);
        margin: 0;
        letter-spacing: -0.2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-left p {
        font-size: 12px;
        color: var(--nuxeo-text-light, #9e9e9e);
        margin: 0;
        font-weight: 400;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-divider {
        width: 1px;
        height: 40px;
        background: var(--nuxeo-border, #e0e0e0);
        flex-shrink: 0;
      }

      .header-controls {
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        gap: 16px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .header-controls nuxeo-select {
        min-width: 150px;
      }

      /* ---------- Custom date pickers ---------- */
      .custom-dates {
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        gap: 12px;
      }

      .date-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .date-field label {
        font-size: 11px;
        color: var(--nuxeo-text-light, #9e9e9e);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .date-field input[type="date"] {
        padding: 0 10px;
        border: 1px solid var(--nuxeo-border, #e0e0e0);
        border-radius: 2px;
        font-size: 13px;
        color: var(--nuxeo-text-default, #333);
        background: white;
        height: 32px;
        box-sizing: border-box;
        font-family: var(--nuxeo-app-font, 'Roboto', sans-serif);
        transition: border-color 0.15s ease;
      }

      .date-field input[type="date"]:focus {
        outline: none;
        border-color: var(--nuxeo-primary-color, #1a73e8);
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.12);
      }

      .custom-submit {
        height: 32px;
        padding: 0 18px;
        border: none;
        border-radius: 2px;
        background: var(--nuxeo-primary-color, #1a73e8);
        color: #ffffff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: var(--nuxeo-app-font, 'Roboto', sans-serif);
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }

      /* ---- On-demand email report row ---- */
      .email-report-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }
      .email-input {
        height: 32px;
        padding: 0 10px;
        border: 1px solid #cfd8dc;
        border-radius: 2px;
        font-size: 13px;
        min-width: 240px;
        font-family: var(--nuxeo-app-font, 'Roboto', sans-serif);
      }
      .email-btn {
        height: 32px;
        padding: 0 18px;
        border: none;
        border-radius: 2px;
        background: #2e7d32;
        color: #ffffff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: var(--nuxeo-app-font, 'Roboto', sans-serif);
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }
      .email-btn:hover {
        background: #276b2b;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      }
      .email-status {
        font-size: 12px;
        color: #5f6b64;
      }

      .custom-submit:hover {
        background: #1669d6;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      }

      .custom-submit:active {
        background: #1257b8;
      }

      /* ---------- KPI strip ---------- */
      .kpi-strip {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: stretch;
      }

      .kpi-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1 1 0;
        min-width: 120px;
        padding: 4px 20px;
        border-right: 1px solid var(--nuxeo-border, #eee);
      }

      .kpi-cell:last-child {
        border-right: none;
      }

      .kpi-value {
        font-size: 26px;
        font-weight: 600;
        color: var(--nuxeo-text-default, #1a73e8);
        line-height: 1.1;
      }

      .kpi-label {
        font-size: 11px;
        color: var(--nuxeo-text-light, #9e9e9e);
        margin-top: 4px;
        letter-spacing: 0.2px;
      }

      /* Insight cell reads as a sentence, not a number */
      .kpi-cell.kpi-insight {
        flex: 1.4 1 0;
        min-width: 180px;
      }

      .kpi-insight-text {
        font-size: 12px;
        font-style: italic;
        color: var(--nuxeo-text-default, #555);
        line-height: 1.5;
      }

      /* ---------- Card grid ---------- */
      .flex-layout {
        display: flex;
        flex-wrap: wrap;
        margin: 16px -8px 0 -8px;
      }

      /* Tight = no top margin (used for KPI strip directly under header) */
      .flex-layout.tight {
        margin-top: 8px;
      }

      .flex-layout nuxeo-card {
        flex: 1 0 calc(33% - 16px);
        margin: 0 8px 16px 8px;
        box-sizing: border-box;
      }

      .flex-layout nuxeo-card.full-width {
        flex: 1 0 calc(100% - 16px);
      }

      /* ---------- View tabs (Overall / By Doc Type / By Format / By Size) ---------- */
      .view-tabs {
        display: flex;
        flex-direction: row;
        gap: 4px;
        margin: 4px 0 12px 0;
        flex-wrap: wrap;
      }

      .view-tab {
        font-size: 12px;
        font-weight: 500;
        color: var(--nuxeo-text-light, #777);
        padding: 6px 14px;
        border-radius: 16px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .view-tab:hover {
        background: var(--nuxeo-page-background, #f0f2f5);
      }

      .view-tab.active {
        background: var(--nuxeo-primary-color, #1a73e8);
        color: white;
      }

      /* ---------- Chart titles + boxes ---------- */
      .chart-sub-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--nuxeo-text-default, #555);
        margin: 0 0 4px 4px;
      }

      /* Single hero chart — tall so the combined view reads clearly */
      .chart-box {
        position: relative;
        width: 100%;
        height: 380px;
        margin-top: 8px;
      }

      .chart-box-small {
        position: relative;
        width: 100%;
        height: 260px;
        margin-top: 8px;
      }

      chart-line,
      chart-bar,
      chart-pie {
        display: block;
        width: 100% !important;
        height: 100% !important;
        font-size: 0.78rem;
      }

      /* ---------- Migration donut ---------- */
      .donut-wrap {
        position: relative;
        width: 100%;
        height: 240px;
        margin-top: 8px;
      }

      .donut-center {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .donut-center .pct {
        font-size: 30px;
        font-weight: 600;
        color: var(--nuxeo-text-default, #2e7d32);
        line-height: 1;
      }

      .donut-center .pct-label {
        font-size: 11px;
        color: var(--nuxeo-text-light, #9e9e9e);
        margin-top: 4px;
        letter-spacing: 0.4px;
      }

      .migration-summary {
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 24px;
        margin-top: 12px;
      }

      .migration-summary .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .migration-summary .stat .num {
        font-size: 16px;
        font-weight: 600;
        color: var(--nuxeo-text-default, #333);
      }

      .migration-summary .stat .lbl {
        font-size: 11px;
        color: var(--nuxeo-text-light, #9e9e9e);
        margin-top: 2px;
      }

      /* ---------- Placeholder slots ---------- */
      .slot-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        gap: 10px;
      }

      .slot-placeholder iron-icon {
        --iron-icon-width: 40px;
        --iron-icon-height: 40px;
        color: var(--nuxeo-border, #ddd);
      }

      .slot-placeholder .placeholder-label {
        font-size: 12px;
        color: var(--nuxeo-text-light, #bbb);
        letter-spacing: 0.3px;
      }

      /* ---------- Empty-state inside a chart card ---------- */
      .chart-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 240px;
        color: var(--nuxeo-text-light, #bbb);
        font-size: 13px;
      }

      /* ---------- Period info icon + hint ---------- */
      .period-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .period-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
      }

      .period-info-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .period-info-icon {
        --iron-icon-width: 16px;
        --iron-icon-height: 16px;
        color: var(--nuxeo-text-light, #9e9e9e);
        cursor: help;
        flex-shrink: 0;
      }

      .period-info-icon:hover {
        color: var(--nuxeo-primary-color, #1a73e8);
      }

      /* Tooltip: hidden by default, shown only while the icon is hovered.
         Anchored to the icon's right edge and extends leftward so it never
         runs off the right side of the screen. */
      .period-tooltip {
        display: none;
        position: absolute;
        top: 24px;
        right: 0;
        width: 260px;
        max-width: 80vw;
        background: #ffffff;
        border: 1px solid var(--nuxeo-border, #e0e0e0);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 11px;
        line-height: 1.45;
        color: var(--nuxeo-text-default, #555);
        z-index: 20;
        white-space: normal;
      }

      .period-info-wrap:hover .period-tooltip {
        display: block;
      }

      /* ---------- Explicit-width cards (per-row layout) ---------- */
      /* Row 1: Migration Adoption 1/3 + Monthly Migration 2/3.
         Row 2: two Top-5 cards at 1/2 each.
         Each row is its own .flex-layout, so these percentages are exact. */
      .flex-layout nuxeo-card.card-onethird {
        flex: 0 0 calc(33.333% - 16px);
        max-width: calc(33.333% - 16px);
      }

      .flex-layout nuxeo-card.card-twothirds {
        flex: 0 0 calc(66.667% - 16px);
        max-width: calc(66.667% - 16px);
        min-width: 0;
      }

      .flex-layout nuxeo-card.card-half {
        flex: 0 0 calc(50% - 16px);
        max-width: calc(50% - 16px);
        min-width: 0;
      }

      /* ---------- Top 5 Use Cases (Slots 4 & 5) ---------- */
      .usecase-subhead {
        font-size: 11px;
        color: var(--nuxeo-text-light, #9e9e9e);
        font-style: italic;
        margin: 0 0 10px 2px;
      }

      .usecase-list {
        display: flex;
        flex-direction: column;
      }

      .usecase-head-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 0 0 6px 0;
        border-bottom: 1px solid var(--nuxeo-border, #eee);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--nuxeo-text-light, #9e9e9e);
      }

      .uc-rank-h   { width: 28px; flex-shrink: 0; }
      .uc-name-h   { flex: 1; min-width: 0; }
      .uc-val-h    { width: 64px; flex-shrink: 0; text-align: right; }
      .uc-status-h { width: 88px; flex-shrink: 0; text-align: center; }

      .usecase-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--nuxeo-border, #f3f3f3);
      }

      .usecase-row:last-child {
        border-bottom: none;
      }

      .uc-rank {
        width: 28px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .uc-rank {
        font-size: 11px;
        font-weight: 600;
        color: var(--nuxeo-text-default, #555);
      }

      .uc-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-right: 10px;
      }

      .uc-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--nuxeo-text-default, #212121);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .uc-bar {
        height: 5px;
        width: 100%;
        background: var(--nuxeo-page-background, #eef1f4);
        border-radius: 3px;
        overflow: hidden;
      }

      .uc-bar-fill {
        height: 100%;
        background: var(--nuxeo-primary-color, #1a73e8);
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .uc-val {
        width: 64px;
        flex-shrink: 0;
        text-align: right;
        font-size: 13px;
        font-weight: 600;
        color: var(--nuxeo-text-default, #212121);
        padding-right: 8px;
      }

      .uc-status {
        width: 88px;
        flex-shrink: 0;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: var(--nuxeo-text-default, #212121);
        box-sizing: border-box;
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 1100px) {
        .flex-layout nuxeo-card {
          flex: 1 0 calc(50% - 16px);
        }
        /* Donut 1/3 + monthly 2/3 keep their ratio down to tablet width */
        .flex-layout nuxeo-card.card-onethird {
          flex: 0 0 calc(33.333% - 16px);
          max-width: calc(33.333% - 16px);
        }
        .flex-layout nuxeo-card.card-twothirds {
          flex: 0 0 calc(66.667% - 16px);
          max-width: calc(66.667% - 16px);
        }
        .flex-layout nuxeo-card.card-half {
          flex: 0 0 calc(50% - 16px);
          max-width: calc(50% - 16px);
        }
      }

      @media (max-width: 768px) {
        .dashboard-container {
          padding: 12px 16px 24px 16px;
        }
        .flex-layout nuxeo-card,
        .flex-layout nuxeo-card.card-onethird,
        .flex-layout nuxeo-card.card-twothirds,
        .flex-layout nuxeo-card.card-half {
          flex: 1 0 calc(100% - 16px);
          max-width: none;
        }
        .header-slot {
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .header-divider {
          display: none;
        }
        .header-controls {
          width: 100%;
          flex-direction: column;
          align-items: flex-start;
        }
        .header-controls nuxeo-select {
          width: 100%;
        }
        .custom-dates {
          flex-direction: column;
          width: 100%;
        }
        .date-field input[type="date"] {
          width: 100%;
        }
        .kpi-cell {
          flex: 1 1 45%;
          border-right: none;
          border-bottom: 1px solid var(--nuxeo-border, #eee);
          padding: 12px 16px;
        }
        .chart-box {
          height: 300px;
        }
      }

    </style>
  </template>
</dom-module>
