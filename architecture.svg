<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="780" viewBox="0 0 1480 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#5b7a3a"/>
    </marker>
    <marker id="arrowback" markerWidth="12" markerHeight="12" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3.5 L8,7 Z" fill="#c07a30"/>
    </marker>
    <filter id="shadow" x="-6%" y="-6%" width="112%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000" flood-opacity="0.13"/>
    </filter>
  </defs>

  <text x="60" y="58" font-size="37" font-weight="700" fill="#2f3b26">Architecture &amp; Implementation</text>
  <text x="60" y="90" font-size="17" fill="#6b7a5a">Custom Nuxeo Analytical Dashboard — month-over-month growth, migration adoption &amp; top use cases</text>

  <g filter="url(#shadow)">
    <rect x="45" y="190" width="150" height="135" rx="10" fill="#ffffff" stroke="#9aa88c" stroke-width="1.5"/>
  </g>
  <text x="120" y="250" font-size="22" font-weight="600" fill="#333" text-anchor="middle">Product</text>
  <text x="120" y="278" font-size="22" font-weight="600" fill="#333" text-anchor="middle">Owner</text>

  <g filter="url(#shadow)">
    <rect x="255" y="130" width="330" height="285" rx="14" fill="#eef3e6" stroke="#7a9a52" stroke-width="2"/>
  </g>
  <text x="420" y="164" font-size="20" font-weight="700" fill="#3d5223" text-anchor="middle">CLIENT (Browser)</text>
  <rect x="283" y="184" width="274" height="102" rx="9" fill="#7cae4f"/>
  <text x="420" y="216" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Analytical Dashboard</text>
  <text x="420" y="240" font-size="13.5" fill="#eef7e3" text-anchor="middle">Web Component · Polymer 2 + Nuxeo Web UI</text>
  <text x="420" y="262" font-size="13.5" fill="#eef7e3" text-anchor="middle">period selector · KPIs · charts</text>
  <rect x="283" y="298" width="274" height="102" rx="9" fill="#6aa03e"/>
  <text x="420" y="330" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Growth · Migration · Top 5 Use Cases</text>
  <text x="420" y="354" font-size="13.5" fill="#eef7e3" text-anchor="middle">Chart.js: bars, donut, pie, progress</text>
  <text x="420" y="376" font-size="13.5" fill="#eef7e3" text-anchor="middle">month-over-month · migrated vs non-migrated</text>

  <g filter="url(#shadow)">
    <rect x="650" y="130" width="365" height="285" rx="14" fill="#e7efdd" stroke="#5e7d38" stroke-width="2"/>
  </g>
  <text x="832" y="164" font-size="20" font-weight="700" fill="#33471e" text-anchor="middle">NUXEO SERVER (Application Tier)</text>
  <rect x="678" y="184" width="309" height="102" rx="9" fill="#4e7a2e"/>
  <text x="832" y="216" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">nuxeo-page-provider</text>
  <text x="832" y="240" font-size="13.5" fill="#e8f2dd" text-anchor="middle">runs NXQL · page-size = 0</text>
  <text x="832" y="262" font-size="13.5" fill="#e8f2dd" text-anchor="middle">reads resultsCount (count only)</text>
  <rect x="678" y="298" width="309" height="102" rx="9" fill="#3c5f23"/>
  <text x="832" y="330" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">nuxeo-repository-data</text>
  <text x="832" y="354" font-size="13.5" fill="#e8f2dd" text-anchor="middle">Elasticsearch aggregations</text>
  <text x="832" y="376" font-size="13.5" fill="#e8f2dd" text-anchor="middle">grouped-by · date-intervals · sum(size)</text>

  <g filter="url(#shadow)">
    <rect x="1080" y="130" width="340" height="285" rx="14" fill="#e4edf4" stroke="#2f5f86" stroke-width="2"/>
  </g>
  <text x="1250" y="164" font-size="20" font-weight="700" fill="#1f4260" text-anchor="middle">ELASTICSEARCH (Index Tier)</text>
  <rect x="1108" y="184" width="284" height="102" rx="9" fill="#2f6690"/>
  <text x="1250" y="216" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Aggregations</text>
  <text x="1250" y="240" font-size="13.5" fill="#dcebf5" text-anchor="middle">buckets per month / per type</text>
  <text x="1250" y="262" font-size="13.5" fill="#dcebf5" text-anchor="middle">storage sums — no docs returned</text>
  <rect x="1108" y="298" width="284" height="102" rx="9" fill="#254e6e"/>
  <text x="1250" y="330" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Count Queries</text>
  <text x="1250" y="354" font-size="13.5" fill="#dcebf5" text-anchor="middle">resultsCount = total hits</text>
  <text x="1250" y="376" font-size="13.5" fill="#dcebf5" text-anchor="middle">billion-document safe</text>

  <line x1="197" y1="255" x2="251" y2="255" stroke="#5b7a3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="587" y1="238" x2="646" y2="238" stroke="#5b7a3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="616" y="226" font-size="12.5" fill="#5b7a3a" text-anchor="middle" font-weight="600">HTTPS</text>
  <text x="616" y="213" font-size="12.5" fill="#5b7a3a" text-anchor="middle" font-weight="600">REST</text>
  <line x1="1017" y1="238" x2="1076" y2="238" stroke="#5b7a3a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1046" y="226" font-size="12.5" fill="#5b7a3a" text-anchor="middle" font-weight="600">NXQL</text>
  <line x1="1076" y1="312" x2="1017" y2="312" stroke="#c07a30" stroke-width="2.5" marker-end="url(#arrowback)"/>
  <line x1="646" y1="312" x2="587" y2="312" stroke="#c07a30" stroke-width="2.5" marker-end="url(#arrowback)"/>
  <line x1="251" y1="282" x2="197" y2="282" stroke="#c07a30" stroke-width="2.5" marker-end="url(#arrowback)"/>
  <text x="832" y="444" font-size="15" fill="#c07a30" text-anchor="middle" font-style="italic">Response — aggregation buckets &amp; counts as JSON</text>

  <line x1="45" y1="352" x2="78" y2="352" stroke="#5b7a3a" stroke-width="2.5"/>
  <text x="86" y="357" font-size="13.5" fill="#555">request</text>
  <line x1="45" y1="376" x2="78" y2="376" stroke="#c07a30" stroke-width="2.5"/>
  <text x="86" y="381" font-size="13.5" fill="#555">response</text>

  <text x="740" y="502" font-size="23" font-weight="700" fill="#3d5223" text-anchor="middle">Implementation Details</text>

  <g filter="url(#shadow)">
    <rect x="50" y="526" width="445" height="210" rx="13" fill="#ffffff" stroke="#7a9a52" stroke-width="1.8"/>
  </g>
  <text x="272" y="558" font-size="17" font-weight="700" fill="#4e7a2e" text-anchor="middle">Document &amp; Storage — Aggregation</text>
  <text x="74" y="592" font-size="13.5" font-family="Consolas, monospace" fill="#333">&lt;nuxeo-repository-data</text>
  <text x="92" y="614" font-size="13.5" font-family="Consolas, monospace" fill="#333">grouped-by="ecm:primaryType"</text>
  <text x="92" y="636" font-size="13.5" font-family="Consolas, monospace" fill="#333">with-date-intervals="month"</text>
  <text x="92" y="658" font-size="13.5" font-family="Consolas, monospace" fill="#333">metrics="sum(file:content.length)"&gt;</text>
  <text x="74" y="690" font-size="13" fill="#666">Elasticsearch groups by month &amp; type;</text>
  <text x="74" y="710" font-size="13" fill="#666">returns only buckets — never documents.</text>

  <g filter="url(#shadow)">
    <rect x="515" y="526" width="460" height="210" rx="13" fill="#ffffff" stroke="#5e7d38" stroke-width="1.8"/>
  </g>
  <text x="745" y="558" font-size="17" font-weight="700" fill="#3c5f23" text-anchor="middle">Migrated Count — NXQL</text>
  <text x="537" y="590" font-size="13" font-family="Consolas, monospace" fill="#333">SELECT * FROM Document WHERE</text>
  <text x="537" y="611" font-size="13" font-family="Consolas, monospace" fill="#333">dc:created BETWEEN &lt;start&gt; AND &lt;end&gt;</text>
  <text x="537" y="632" font-size="13" font-family="Consolas, monospace" fill="#333">AND fid_migration:migrationHistory/*</text>
  <text x="537" y="653" font-size="13" font-family="Consolas, monospace" fill="#333">    IS NOT NULL</text>
  <text x="537" y="686" font-size="13" fill="#666">Any migration-history entry present =&gt; migrated.</text>
  <text x="537" y="708" font-size="13" fill="#666">Non-migrated = total - migrated.</text>

  <g filter="url(#shadow)">
    <rect x="995" y="526" width="435" height="210" rx="13" fill="#ffffff" stroke="#2f5f86" stroke-width="1.8"/>
  </g>
  <text x="1212" y="558" font-size="17" font-weight="700" fill="#1f4260" text-anchor="middle">Key Behavior</text>
  <text x="1019" y="590" font-size="14" fill="#333">• Charts -&gt; Elasticsearch aggregations (buckets)</text>
  <text x="1019" y="618" font-size="14" fill="#333">• Counts -&gt; resultsCount, page-size = 0</text>
  <text x="1019" y="646" font-size="14" fill="#333">• No documents fetched for any number</text>
  <text x="1019" y="674" font-size="14" fill="#333">• Period-driven: one date range -&gt; all views</text>
  <text x="1019" y="702" font-size="14" fill="#333">• Scales safely to a billion documents</text>
</svg>
